name: "Build LIMA on Windows (Visual Studio 2022)"

on:
    # Manual-only: the first vcpkg build of Qt6 + Boost takes hours and can hit the
    # job time limit, so this must not gate PRs or master merges. Run it on demand
    # from the Actions tab (or `gh workflow run`) when working on Windows support.
    workflow_dispatch:

env:
    # libtorch version must match extern/download_libtorch.sh
    LIBTORCH_VERSION: "2.1.0"

jobs:
    build-VS-2022:
        runs-on: windows-2022
        strategy:
            matrix:
                configuration: [Release]
                platform: [x64]

        steps:
            - name: "Checkout code"
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: "Set up MSVC developer environment"
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: x64

            - name: "Install build dependencies via vcpkg"
              uses: johnwason/vcpkg-action@v6
              id: vcpkg
              with:
                pkgs: >-
                    boost-regex boost-filesystem boost-program-options
                    boost-system boost-thread boost-test boost-iostreams
                    eigen3 icu qtbase
                triplet: x64-windows-release
                token: ${{ github.token }}
                github-binarycache: true

            - name: "Download libtorch (CPU, shared with deps)"
              shell: pwsh
              run: |
                  $url = "https://download.pytorch.org/libtorch/cpu/libtorch-win-shared-with-deps-${env:LIBTORCH_VERSION}%2Bcpu.zip"
                  Write-Host "Downloading $url"
                  Invoke-WebRequest -Uri $url -OutFile libtorch.zip
                  Expand-Archive -Path libtorch.zip -DestinationPath "${{ github.workspace }}/extern"
                  Remove-Item libtorch.zip

            - name: "Compute release identifier"
              shell: bash
              run: |
                  echo "$(git show -s --format=%cI HEAD | sed -e 's/[^0-9]//g')-$(git rev-parse --short HEAD)" > release
                  echo "LIMA_VERSION_RELEASE=$(cat release)" >> "$GITHUB_ENV"

            - name: "Configure (CMake)"
              shell: pwsh
              run: |
                  cmake -G Ninja -B build `
                    -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
                    -DVCPKG_TARGET_TRIPLET=x64-windows-release `
                    -DCMAKE_BUILD_TYPE=Release `
                    -DCMAKE_PREFIX_PATH="${{ github.workspace }}/extern/libtorch" `
                    -DLIMA_VERSION_RELEASE="${env:LIMA_VERSION_RELEASE}" `
                    -DWITH_LIMA_RESOURCES=OFF `
                    -DWITH_GUI=OFF `
                    -DWITH_DEBUG_MESSAGES=ON `
                    -DWITH_ARCH=OFF `
                    -DWITH_ASAN=OFF `
                    -DSHORTEN_POR_CORPUS_FOR_SVMLEARN=ON

            - name: "Build"
              shell: pwsh
              run: cmake --build build --config Release
